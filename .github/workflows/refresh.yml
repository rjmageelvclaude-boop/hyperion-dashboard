name: Refresh dashboards

on:
  schedule:
    # Every 10 minutes, offset from :00/:15/:30/:45 - GitHub delays scheduled
    # runs the most at the popular round-number marks.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel a run that is already building: with five boards a full run can
# outlast the dispatch interval, and a cancelled run never reaches the deploy
# step (the site silently stops updating). New dispatches queue behind the
# active run; GitHub keeps at most one queued and drops the rest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet openpyxl

      - name: Restore cached reports + Command Center history
        uses: actions/cache/restore@v4
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
            site/ca-board/data.json
            site/tech-board/data.json
            site/plumb-board/data.json
            site/csr-board/data.json
            site/install-board/data.json
            site/silo-board/data.json
            site/goat-board/data.json
          key: reports-${{ github.run_id }}
          restore-keys: reports-

      # ---- All dashboards: Gmail-fed contest board + live ServiceTitan boards.
      # The API boards are independent processes writing independent files, so
      # they run in parallel - wall time is the slowest board, not the sum.
      # Each process throttles itself (ST_MAX_CONCURRENCY) and the client
      # retries 429s with backoff, so the combined load stays polite.
      - name: Refresh all dashboards
        timeout-minutes: 15
        continue-on-error: true
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ST_SECRETS_JSON: ${{ secrets.ST_SECRETS_JSON }}
          ST_TIMEOUT: "120"
          ST_PAGE_CONCURRENCY: "4"   # concurrent pages per list fetch
          ST_MAX_CONCURRENCY: "8"    # in-flight request cap per board process
          # Bound each board's closed-month YTD backfill: at most this many seconds
          # per run, resuming from the cached history file on the next run.
          TECH_BOARD_BUDGET: "90"
          PLUMB_BOARD_BUDGET: "90"
          CSR_BOARD_BUDGET: "90"
          INSTALL_BOARD_BUDGET: "120"
          SILO_BOARD_BUDGET: "120"
          GOAT_BOARD_BUDGET: "90"
        run: |
          mkdir -p secrets logs
          printf '%s' "$ST_SECRETS_JSON" > secrets/servicetitan.json

          # Contest dashboard (emailed reports) - independent of the API boards
          (
            timeout 300 python build/fetch_gmail.py || echo "Gmail fetch failed - using cached reports"
            if [ -f data/sales_by_rep.xlsx ] && [ -f data/installed_by_rep.xlsx ]; then
              python build/parse_reports.py
            else
              echo "Missing report file(s) - deploying last committed data."
            fi
          ) > logs/contest.log 2>&1 &

          # Live API boards, staggered a touch so eight processes don't hit
          # the auth server in the same instant.
          for board in command_center call_board ca_board tech_board plumb_board csr_board install_board silo_board; do
            python "build/${board}_refresh.py" > "logs/${board}.log" 2>&1 \
              || echo "${board} refresh failed - deploying cached data.json" >> "logs/${board}.log" &
            sleep 2
          done
          wait

          # GOAT board reads the other boards' data.json - always last
          python build/goat_board_refresh.py || echo "GOAT board refresh failed - deploying cached data.json"

          for f in logs/*.log; do echo "::group::$f"; cat "$f"; echo "::endgroup::"; done
          rm -rf secrets logs

      - name: Save reports + history for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
            site/ca-board/data.json
            site/tech-board/data.json
            site/plumb-board/data.json
            site/csr-board/data.json
            site/install-board/data.json
            site/silo-board/data.json
            site/goat-board/data.json
          key: reports-${{ github.run_id }}

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
